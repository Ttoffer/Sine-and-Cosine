<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-labelledby="title desc">
  <title id="title">Hal AI by CJF icon</title>
  <desc id="desc">Compact Hal AI by CJF project icon with glow accents and heartbeat trace</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09123a"/>
      <stop offset="48%" stop-color="#251b7a"/>
      <stop offset="100%" stop-color="#0f2459"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="72%" cy="10%" r="52%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="52%" cy="100%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="28%" stop-color="#a78bfa" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect width="120" height="120" rx="26" fill="url(#topGlow)"/>
  <rect width="120" height="120" rx="26" fill="url(#bottomGlow)"/>
  <rect x="3.5" y="3.5" width="113" height="113" rx="22.5" fill="none" stroke="#ffffff" opacity="0.1"/>
  <g filter="url(#softGlow)">
    <circle cx="20" cy="18" r="3.1" fill="#ff5a6b" opacity="0.96">
      <animate attributeName="opacity" values="0.08;1;0.08" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="18" r="4.2" fill="none" stroke="#ff7b88" stroke-width="1.05" opacity="0.42">
      <animate attributeName="r" values="4.2;7.1;4.2" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.04;0.16;0.04" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity="0.28" stroke="#8b5cf6" stroke-width="1" fill="none">
    <path d="M13 66l5-3 5 3v6l-5 3-5-3z"/>
    <path d="M25 72l5-3 5 3v6l-5 3-5-3z"/>
    <path d="M24 59l5-3 5 3v6l-5 3-5-3z"/>
    <path d="M92 14l4-2.5 4 2.5v5l-4 2.5-4-2.5z"/>
    <path d="M102 20l4-2.5 4 2.5v5l-4 2.5-4-2.5z"/>
  </g>
  <g filter="url(#softGlow)" opacity="0.85">
    <path d="M88 26h8M92 22v8" stroke="#dbeafe" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="103" cy="31" r="1.2" fill="#ffffff"/>
  </g>
  <g filter="url(#glow)">
    <text x="60" y="52" fill="#f8fafc" stroke="#67e8f9" stroke-opacity="0.24" stroke-width="0.5" paint-order="stroke" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="23" font-weight="700" letter-spacing="0.01em">Hal A<tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic">I</tspan></text>
    <text x="60" y="69" fill="#dbeafe" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8.8" font-weight="700" letter-spacing="0.28em">CJF</text>
  </g>
  <g filter="url(#softGlow)">
    <path d="M76 92h8l2-1 2 1 3 0.5 3 7 3-13 4 9 3-3h11" fill="none" stroke="#5eead4" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>
  </g>
  <g filter="url(#glow)">
    <path d="M76 92h8l2-1 2 1 3 0.5 3 7 3-13 4 9 3-3h11" fill="none" stroke="#67e8f9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="22 78" stroke-dashoffset="100" opacity="0.96">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.95;1;0.88;0" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
