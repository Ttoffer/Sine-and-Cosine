<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" width="320" height="88" role="img" aria-labelledby="title desc">
  <title id="title">Hal AI by CJF</title>
  <desc id="desc">Animated Hal AI wordmark with sharper lettering, a slow colour gradient through the letters, a final upright stroke, and a small white star-like accent above it</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09123a"/>
      <stop offset="48%" stop-color="#251b7a"/>
      <stop offset="100%" stop-color="#0f2459"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="72%" cy="10%" r="52%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="52%" cy="100%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.75"/>
      <stop offset="28%" stop-color="#a78bfa" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="movingText" x1="20" y1="18" x2="300" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="18%" stop-color="#67e8f9"/>
      <stop offset="38%" stop-color="#38bdf8"/>
      <stop offset="56%" stop-color="#a78bfa"/>
      <stop offset="76%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fde68a"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-68 0;68 0;-68 0" dur="8.6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="88" rx="14" fill="url(#bg)"/>
  <rect width="320" height="88" rx="14" fill="url(#topGlow)"/>
  <rect width="320" height="88" rx="14" fill="url(#bottomGlow)"/>
  <rect x="6" y="6" width="308" height="76" rx="11" fill="none" stroke="#ffffff" opacity="0.1"/>
  <g opacity="0.25" stroke="#8b5cf6" stroke-width="1.05" fill="none">
    <path d="M16 56l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M30 63l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M28 49l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M286 10l5-3 5 3v6l-5 3-5-3z"/>
    <path d="M298 17l5-3 5 3v6l-5 3-5-3z"/>
  </g>
  <g>
    <text x="160" y="41"
      fill="none"
      stroke="#051227"
      stroke-width="3.4"
      paint-order="stroke"
      text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="27.5"
      font-weight="800"
      letter-spacing="0.03em">Hal A</text>
    <text x="160" y="41"
      fill="url(#movingText)"
      fill-opacity="0.72"
      stroke="#ecfeff"
      stroke-width="1.05"
      paint-order="stroke fill"
      text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="27.5"
      font-weight="800"
      letter-spacing="0.03em">Hal A</text>
    <text x="160" y="41"
      fill="none"
      stroke="#67e8f9"
      stroke-opacity="0.46"
      stroke-width="0.55"
      text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="27.5"
      font-weight="800"
      letter-spacing="0.03em">Hal A</text>
    <rect x="201.7" y="30.45" width="7.6" height="11.4" rx="2.3" fill="#051227"/>
    <rect x="202.75" y="30.85" width="5.5" height="10.5" rx="1.8" fill="url(#movingText)"/>
    <rect x="203.35" y="31.25" width="1.05" height="9.6" rx="0.5" fill="#ecfeff" opacity="0.58"/>
    <text x="160" y="60"
      fill="#dbeafe"
      text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="11.2"
      font-weight="800"
      letter-spacing="0.4em">CJF</text>
  </g>
  <g filter="url(#softGlow)" opacity="0.92">
    <circle cx="205.5" cy="20.5" r="2.3" fill="#ffffff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M205.5 14.9v3.2M205.5 22.9v3.2M199.9 20.5h3.2M207.9 20.5h3.2M201.6 16.6l2.3 2.3M207.1 22.1l2.3 2.3M209.4 16.6l-2.3 2.3M203.9 22.1l-2.3 2.3"
      stroke="#ffffff" stroke-width="0.95" stroke-linecap="round" opacity="0.88">
      <animate attributeName="opacity" values="0.22;0.95;0.22" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <circle cx="205.5" cy="20.5" r="4.35" fill="none" stroke="#ffffff" stroke-width="0.95" opacity="0.2">
      <animate attributeName="r" values="4.35;7.2;4.35" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.05;0.18;0.05" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g filter="url(#softGlow)" opacity="0.78">
    <circle cx="29" cy="18" r="3" fill="#ff5a6b">
      <animate attributeName="opacity" values="0.18;0.95;0.18" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="29" cy="18" r="4.1" fill="none" stroke="#ff7b88" stroke-width="1.1" opacity="0.28">
      <animate attributeName="r" values="4.1;6.9;4.1" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g filter="url(#softGlow)">
    <path d="M244 68h11l3-1.5 3 1.5 4 0.5 4 10.5 4-19 5 13 4-5h16" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
    <path d="M244 68h11l3-1.5 3 1.5 4 0.5 4 10.5 4-19 5 13 4-5h16" fill="none" stroke="#67e8f9" stroke-width="2.15" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="22 78" stroke-dashoffset="100" opacity="0.96">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.95;1;0.88;0" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
