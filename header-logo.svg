<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" width="320" height="88" role="img" aria-labelledby="title desc">
  <title id="title">Hal AI by CJF</title>
  <desc id="desc">Futuristic Hal AI wordmark styled after the Fifth Dimension AI mark with luminous cyan glow, hex-tech accents, and a subtle animated pulse trace</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09123a"/>
      <stop offset="48%" style="stop-color:#251b7a"/>
      <stop offset="100%" style="stop-color:#0f2459"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="72%" cy="10%" r="52%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:0.95"/>
      <stop offset="38%" style="stop-color:#22d3ee;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="52%" cy="100%" r="58%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.85"/>
      <stop offset="28%" style="stop-color:#a78bfa;stop-opacity:0.42"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="62%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="88" rx="14" fill="url(#bg)"/>
  <rect width="320" height="88" rx="14" fill="url(#topGlow)"/>
  <rect width="320" height="88" rx="14" fill="url(#bottomGlow)"/>
  <rect x="6" y="6" width="308" height="76" rx="11" fill="none" stroke="#ffffff" opacity="0.1"/>
  <g filter="url(#softGlow)">
    <circle cx="29" cy="18" r="3" fill="#ff5a6b" opacity="0.96">
      <animate attributeName="opacity" values="0.08;1;0.08" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="29" cy="18" r="4.2" fill="none" stroke="#ff7b88" stroke-width="1.15" opacity="0.42">
      <animate attributeName="r" values="4.2;7.1;4.2" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.04;0.16;0.04" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity="0.28" stroke="#8b5cf6" stroke-width="1.1" fill="none">
    <path d="M16 56l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M30 63l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M28 49l6-3.5 6 3.5v7l-6 3.5-6-3.5z"/>
    <path d="M286 10l5-3 5 3v6l-5 3-5-3z"/>
    <path d="M298 17l5-3 5 3v6l-5 3-5-3z"/>
  </g>
  <g filter="url(#softGlow)" opacity="0.82">
    <path d="M277 24h10M282 19v10" stroke="#dbeafe" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="293" cy="29" r="1.4" fill="#ffffff"/>
  </g>
  <g filter="url(#glow)">
    <text x="160" y="41" fill="url(#textFill)" stroke="#67e8f9" stroke-opacity="0.24" stroke-width="0.6" paint-order="stroke" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="27.5" font-weight="700" letter-spacing="0.03em">Hal A<tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic">I</tspan></text>
    <text x="160" y="60" fill="#dbeafe" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11.2" font-weight="700" letter-spacing="0.4em">CJF</text>
  </g>
  <g filter="url(#softGlow)">
    <path d="M244 68h11l3-1.5 3 1.5 4 0.5 4 10.5 4-19 5 13 4-5h16" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.22"/>
  </g>
  <g filter="url(#glow)">
    <path d="M244 68h11l3-1.5 3 1.5 4 0.5 4 10.5 4-19 5 13 4-5h16" fill="none" stroke="#67e8f9" stroke-width="2.15" stroke-linecap="round" stroke-linejoin="round" pathLength="100" stroke-dasharray="22 78" stroke-dashoffset="100" opacity="0.96">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.95;1;0.88;0" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
